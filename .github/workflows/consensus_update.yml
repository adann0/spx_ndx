name: Consensus Update

on:
  schedule:
    - cron: "0 8 1 * *"  # 08:00 UTC, 1st of each month
  workflow_dispatch:

jobs:
  consensus:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: make fetch
      - run: make dataset
      - run: make consensus
      - run: make stresstest
      - run: make plotmodel

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/spx_consensus_*.png output/spx_consensus_*.json output/spx_consensus_*.parquet
          git diff --staged --quiet || git commit -m "chore: consensus update $(date -u '+%Y-%m-%d')"
          git push
