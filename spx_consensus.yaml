frequency: monthly

train_start_year: 1993
first_test_year: 2003
test_years: 2

trader_min_rtr: 0.6
vote_threshold: 0.6

min_signals_per_trader: 2
max_signals_per_trader: 5
top_traders: 100

min_traders_per_group: 2
max_traders_per_group: 2
group_min_rtr: 0.01
group_min_cagr: 0.01
top_groups: 50
group_aggregation: cagr_weighted

cagr_thresholds: [0.08, 0.09, 0.10]

indicators:
  VIX<X:        [30]
  RSI 30-X:     [75]
  MACDhist>X:   [0]
  MACDline>X:   [0]
  CAPE-PE<X:    [0.5, 1, 1.5]
  CPI<X:        [4, 5]
  VP>VAL Xm:    [3]
  YC z>X:       [-1]
  Credit z<X:   [1]
  RVol z<X:     [1]

adaptive:
  val_years: 2
  grid:
    vote_threshold: [0.5, 0.6, 0.7]
    trader_min_rtr: [0.5, 0.6, 0.7]
