<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spx_ndx</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0d1117;
      padding: 2rem 2rem 0;
      border-bottom: 1px solid #21262d;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #f0f6fc;
      margin-bottom: 1.5rem;
    }

    header h1 span {
      color: #f0f6fc;
    }

    nav {
      display: flex;
      gap: 0;
      overflow-x: auto;
    }

    nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      cursor: pointer;
      font-size: 0.875rem;
      padding: 0.6rem 1.2rem;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    nav button:hover { color: #e6edf3; }

    nav button.active {
      color: #f0f6fc;
      border-bottom-color: #58a6ff;
    }

    main {
      padding: 2rem;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: #388bfd66; }

    .card img {
      width: 100%;
      display: block;
    }

  </style>
</head>
<body>

<header>
  <h1>spx_<span>ndx</span></h1>
  <nav id="nav">
    <button class="active" data-tab="prices">Prices</button>
    <button data-tab="fundamentals">SPX Fundamentals</button>
    <button data-tab="internals">Market Internals</button>
    <button data-tab="analysis">Analysis</button>
    <button data-tab="macro">Macro</button>
    <button data-tab="rates">Rates &amp; Credits</button>
    <button data-tab="consensus">SPX Consensus</button>
  </nav>
</header>

<main>

  <div class="tab-panel active" id="prices">
    <div class="grid">
      <div class="card"><img src="output/spx_ema200.png" /></div>
      <div class="card"><img src="output/ndx_ema200.png" /></div>
      <div class="card"><img src="output/msci_ndx_spx.png" /></div>
      <div class="card"><img src="output/spy_volume_profile.png" /></div>
      <div class="card"><img src="output/qqq_volume_profile.png" /></div>
    </div>
  </div>

  <div class="tab-panel" id="fundamentals">
    <div class="grid">
      <div class="card"><img src="output/buffett_indicator.png" /></div>
      <div class="card"><img src="output/spx_cape.png" /></div>
      <div class="card"><img src="output/spx_pe.png" /></div>
      <div class="card"><img src="output/ps_ratio.png" /></div>
      <div class="card"><img src="output/dividend_yield.png" /></div>
      <div class="card"><img src="output/eps.png" /></div>
      <div class="card"><img src="output/sales_per_share.png" /></div>
      <div class="card"><img src="output/corp_margins.png" /></div>
    </div>
  </div>

  <div class="tab-panel" id="internals">
    <div class="grid">
      <div class="card"><img src="output/vix.png" /></div>
      <div class="card"><img src="output/spx_drawdown.png" /></div>
      <div class="card"><img src="output/ndx_spx_ratio.png" /></div>
    </div>
  </div>

  <div class="tab-panel" id="analysis">
    <div class="grid">
      <div class="card"><img src="output/spx_cape_overlay.png" /></div>
      <div class="card"><img src="output/spx_cape_pe_spread.png" /></div>
      <div class="card"><img src="output/composite_valuation.png" /></div>
      <div class="card"><img src="output/cape_scatter_10y.png" /></div>
      <div class="card"><img src="output/implied_return.png" /></div>
    </div>
  </div>

  <div class="tab-panel" id="macro">
    <div class="grid">
      <div class="card"><img src="output/cpi_inflation.png" /></div>
      <div class="card"><img src="output/unemployment.png" /></div>
      <div class="card"><img src="output/federal_debt.png" /></div>
      <div class="card"><img src="output/m2_gdp.png" /></div>
    </div>
  </div>

  <div class="tab-panel" id="rates">
    <div class="grid">
      <div class="card"><img src="output/yield_curve.png" /></div>
      <div class="card"><img src="output/real_rates.png" /></div>
      <div class="card"><img src="output/credit_spreads.png" /></div>
      <div class="card"><img src="output/ecy.png" /></div>
      <div class="card"><img src="output/fed_model.png" /></div>
    </div>
  </div>

  <div class="tab-panel" id="consensus">
    <div class="grid">
      <div class="card"><img src="output/spx_consensus_explain.png" /></div>
      <div class="card"><img src="output/spx_consensus_folds_cagr.png" /></div>
      <div class="card"><img src="output/spx_consensus_cross_validation_spx.png" /></div>
      <div class="card"><img src="output/spx_consensus_cross_validation_ndx.png" /></div>
      <div class="card"><img src="output/spx_consensus_cross_validation_msci_world.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_summary.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_1_permutation.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_2_bootstrap.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_3_noise.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_4_retnoise.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_5_txcosts.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_6_vintage.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_6_vintage_dca.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_7_decades.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_8_regimes.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_9_scatter.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_10_rolling_sharpe.png" /></div>
      <div class="card"><img src="output/spx_consensus_stress_11_cumalpha.png" /></div>
    </div>
  </div>

</main>

<script>
  const nav = document.getElementById("nav");
  nav.addEventListener("click", e => {
    const btn = e.target.closest("button");
    if (!btn) return;
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
</script>

</body>
</html>
